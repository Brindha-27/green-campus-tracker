<body>

    <div class="container">
        <h1>🌱 Green Campus Tracker</h1>
        <p class="subtitle">Build sustainable habits by tracking your daily eco actions</p>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter eco action">
            <button onclick="addTask()">Add</button>
        </div>

        <h3 id="count">Total Actions: 0</h3>

        <ul id="taskList"></ul>

        <div class="tip-section">
            <button onclick="showTip()">💡 Get Eco Tip</button>
            <p id="tip"></p>
        </div>
    </div>

</body>
