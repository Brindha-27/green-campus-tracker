<!DOCTYPE html>
<html>
<head>
    <title>Green Campus Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🌱 Green Campus Tracker</h1>
    <p>Track your daily eco-friendly actions and build a greener campus 🌱</p>

    <input type="text" id="taskInput" placeholder="Enter eco action">
    <button onclick="addTask()">Add</button>

    <h3 id="count">Total Actions: 0</h3>

    <ul id="taskList"></ul>

    <button onclick="showTip()">Get Eco Tip</button>
    <p id="tip"></p>

    <script src="script.js"></script>

</body>
</html>
